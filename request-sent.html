<!DOCTYPE html>
<html lang="en">
<head>

  <style>

      --sage: #A8B89A;
      --cream: #F5E6D3;
      --golden: #C9A45C;
      --brown: #8B6F5A;
    }

    body {
      background-color: var(--cream);
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      color: var(--brown);

      background: #fff;

      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      max-width: 420px;

    .btn {
      display: inline-block;
      background-color: var(--brown);
      color: #fff;
      padding: 0.8rem 1.4rem;
      border-radius: 999px;
      text-decoration: none;
      margin-top: 1rem;
    }

<body>
  <div class="card">
    <h1>Request Sent!</h1>
